<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIMI</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2d3e50);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .header {
      padding: 18px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: rgba(0,0,0,0.2);
    }

    .auth, .chat {
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, button {
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
    }

    input {
      flex: 1;
    }

    button {
      cursor: pointer;
      background: #4a67ff;
      color: white;
      font-weight: bold;
    }

    #messages {
      list-style: none;
      margin: 0;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
    }

    #messages li {
      background: white;
      color: #222;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .username {
      font-weight: bold;
      color: #4a67ff;
      display: block;
      margin-bottom: 4px;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .error {
      color: #ffb3b3;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      .row, .topbar {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">MINI</div>

    <div id="authBox" class="auth">
      <div class="row">
        <input id="authUsername" type="text" placeholder="Логин">
      </div>
      <div class="row">
        <input id="authPassword" type="password" placeholder="Пароль">
      </div>
      <div class="row">
        <button id="registerBtn">Регистрация</button>
        <button id="loginBtn">Вход</button>
      </div>
      <div id="authError" class="error"></div>
    </div>

    <div id="chatBox" class="chat hidden">
      <div class="topbar">
        <div>Вы вошли как: <span id="currentUser"></span></div>
        <button id="logoutBtn">Выйти</button>
      </div>

      <ul id="messages"></ul>

      <div class="row" style="margin-top:12px;">
        <input id="messageInput" type="text" placeholder="Введите сообщение">
        <button id="sendBtn">Отправить</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const authBox = document.getElementById("authBox");
    const chatBox = document.getElementById("chatBox");
    const authUsername = document.getElementById("authUsername");
    const authPassword = document.getElementById("authPassword");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const authError = document.getElementById("authError");
    const currentUser = document.getElementById("currentUser");
    const messages = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    let username = null;

    function showChat(user) {
      username = user.username;
      currentUser.textContent = username;
      authBox.classList.add("hidden");
      chatBox.classList.remove("hidden");
    }

    function showAuth() {
      username = null;
      authBox.classList.remove("hidden");
      chatBox.classList.add("hidden");
    }

    function addMessage(msg) {
      const li = document.createElement("li");
      li.innerHTML = `<span class="username">${msg.username}</span>${msg.text}`;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    async function loadMessages() {
      messages.innerHTML = "";
      const res = await fetch("/messages");
      const data = await res.json();
      data.forEach(addMessage);
    }

    async function checkSession() {
      const res = await fetch("/me");
      const data = await res.json();
      if (data.user) {
        showChat(data.user);
        loadMessages();
      } else {
        showAuth();
      }
    }

    registerBtn.onclick = async () => {
      authError.textContent = "";
      const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: authUsername.value.trim(),
          password: authPassword.value.trim()
        })
      });

      const data = await res.json();

      if (!res.ok) {
        authError.textContent = data.error || "Ошибка регистрации";
        return;
      }

      showChat({ username: data.username });
      loadMessages();
    };

    loginBtn.onclick = async () => {
      authError.textContent = "";
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: authUsername.value.trim(),
          password: authPassword.value.trim()
        })
      });

      const data = await res.json();

      if (!res.ok) {
        authError.textContent = data.error || "Ошибка входа";
        return;
      }

      showChat({ username: data.username });
      loadMessages();
    };

    logoutBtn.onclick = async () => {
      await fetch("/logout", { method: "POST" });
      showAuth();
    };

    sendBtn.onclick = () => {
      const text = messageInput.value.trim();
      if (!text || !username) return;

      socket.emit("chat message", {
        username,
        text
      });

      messageInput.value = "";
      messageInput.focus();
    };

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendBtn.onclick();
    });

    socket.on("chat message", (msg) => {
      addMessage(msg);
    });

    checkSession();
  </script>
</body>
</html>
